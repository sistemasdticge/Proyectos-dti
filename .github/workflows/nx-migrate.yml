name: Monthly Nx and Angular Migrate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate migrations for latest Nx and Angular ecosystem
        run: npx nx@latest migrate latest

      - name: Install updated dependencies
        run: npm install

      - name: Run migrations
        run: npx nx migrate --run-migrations

      - name: Verify workspace
        run: npx nx run-many -t lint,test,build --all

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: monthly Nx/Angular migrations'
          title: 'chore: monthly Nx/Angular migrations'
          body: |
            Automated monthly migration generated by CI.

            Includes:
            - `nx migrate latest`
            - dependency installation
            - migration execution
            - workspace verification (`lint`, `test`, `build`)
          branch: chore/monthly-nx-migrate
          delete-branch: true
          labels: |
            dependencies
            automated

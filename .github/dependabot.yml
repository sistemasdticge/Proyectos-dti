version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
      - automated

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated

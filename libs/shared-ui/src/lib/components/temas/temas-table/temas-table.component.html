<p-table
  [value]="rows"
  [loading]="loading"
  styleClass="p-datatable-sm temas-main-table"
  [rowHover]="true"
>
  <ng-template pTemplate="header">
    <tr class="text-xs font-semibold uppercase text-slate-500">
      <th class="w-36 min-w-36 pl-4">Numero de Control</th>
      <th class="min-w-0">Descripcion</th>
      <th class="w-28">Prioridad</th>
      <th class="w-32">Vencimiento</th>
      <th class="w-44">Avance</th>
      <th class="w-28">Estado</th>
      <th class="w-20 pr-4 text-right"></th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-row>
    <tr class="border-b border-slate-100 align-middle">
      <td class="py-2 pl-4 align-middle">
        <span class="inline-flex whitespace-nowrap text-sm font-semibold text-[#8B1A2E]">{{ formatNumControl(row.numControl) }}</span>
      </td>
      <td class="py-2 align-middle">
        <p class="line-clamp-1 text-sm font-semibold text-slate-800">{{ row.descripcion }}</p>
        @if (row.subtitulo) {
          <p class="mt-0.5 line-clamp-1 text-xs text-slate-400">{{ row.subtitulo }}</p>
        }
      </td>
      <td class="py-2 align-middle">
        <p-tag
          [value]="row.prioridad"
          [severity]="prioridadSeverity(row.prioridad)"
          styleClass="!rounded-full !text-xs !px-2"
        />
      </td>
      <td class="whitespace-nowrap py-2 align-middle text-sm text-slate-600">{{ formatFecha(row.vencimientoLabel) }}</td>
      <td class="py-2 align-middle">
        <div class="min-w-[9rem]">
          <div class="h-1.5 overflow-hidden rounded-full bg-slate-100">
            <span
              class="block h-full rounded-full transition-[width] duration-300"
              [ngClass]="progressBarClass(row)"
              [style.width.%]="progressValue(row)"
            ></span>
          </div>
          <p class="mt-1 whitespace-nowrap text-[0.68rem] font-medium text-slate-500">{{ progressLabel(row) }}</p>
        </div>
      </td>
      <td class="py-2 align-middle">
        <p-tag
          [value]="row.estado"
          [severity]="estadoSeverity(row.estado)"
          styleClass="!rounded-full !text-xs !px-2"
        />
      </td>
      <td class="py-2 pr-4 text-right align-middle">
        <button
          pButton
          type="button"
          class="p-button-outlined !rounded-lg !border-[#8B1A2E]/30 !px-3 !py-1 !text-xs !font-semibold !text-[#8B1A2E] hover:!border-[#8B1A2E] hover:!bg-[#fff3f6]"
          (click)="detail.emit(row)"
        >Ver</button>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7" class="py-10 text-center text-sm text-slate-400">
        No hay temas que mostrar.
      </td>
    </tr>
  </ng-template>
</p-table>

<section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
  @for (card of cards; track card.type) {
    <button
      type="button"
      class="group flex min-h-44 flex-col justify-between rounded-2xl border bg-white p-4 text-left shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-md"
      [class.border-[#d9c7ce]]="selectedType === card.type"
      [class.bg-[#fff8fa]]="selectedType === card.type"
      [class.border-slate-200]="selectedType !== card.type"
      (click)="selectedTypeChange.emit(card.type)"
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.14em] text-slate-400">Catálogo</p>
          <h3 class="mt-1 text-xl font-bold text-[#24344d]">{{ card.title }}</h3>
          <p class="mt-1 text-sm text-slate-500">{{ card.subtitle }}</p>
        </div>
        <span class="inline-flex h-11 w-11 items-center justify-center rounded-2xl text-white shadow-sm" [class]="card.accentClass">
          <i class="text-lg" [class]="card.icon"></i>
        </span>
      </div>

      <div class="mt-5 flex items-center justify-between border-t border-slate-100 pt-3">
        <span class="text-xs font-semibold uppercase tracking-[0.12em] text-slate-400">Registros</span>
        <span class="text-2xl font-bold text-[#8B1A2E]">{{ card.count }}</span>
      </div>
    </button>
  }
</section>

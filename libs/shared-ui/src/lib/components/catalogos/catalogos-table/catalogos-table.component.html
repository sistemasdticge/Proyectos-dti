<section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <header class="border-b border-slate-200 px-5 py-4">
    <h2 class="text-xl font-bold tracking-[-0.02em] text-[#24344d]">{{ title }}</h2>
  </header>

  <p-table
    [value]="rows"
    [loading]="loading"
    styleClass="p-datatable-sm"
    [rowHover]="true"
    [scrollable]="true"
    scrollHeight="26rem"
  >
    <ng-template pTemplate="header">
      <tr class="text-xs font-semibold uppercase text-slate-500">
        <th class="w-12 pl-4 text-center">#</th>
        <th>Descripción</th>
        <th class="w-28">Estado</th>
        <th class="w-28 text-center">Activo</th>
        <th class="w-28 text-center">Editar</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row let-i="rowIndex">
      <tr
        class="border-b border-slate-100 transition-all duration-200"
        [ngClass]="row.activo ? 'bg-white' : 'bg-slate-50/90'"
      >
        <td class="pl-4 text-center text-sm font-semibold" [ngClass]="row.activo ? 'text-slate-400' : 'text-slate-300'">{{ i + 1 }}</td>
        <td class="font-medium" [ngClass]="row.activo ? 'text-slate-800' : 'text-slate-400'">{{ row.descripcion }}</td>
        <td [ngClass]="row.activo ? '' : 'opacity-70'">
          <p-tag
            [value]="row.activo ? 'Activo' : 'Inactivo'"
            [severity]="tagSeverity(row.activo)"
            styleClass="!rounded-full !text-xs !px-2"
          />
        </td>
        <td class="text-center" [ngClass]="row.activo ? '' : 'opacity-65'">
          <p-toggleswitch
            class="transition-opacity duration-200"
            [ngModel]="row.activo"
            (onChange)="toggleActive.emit({ record: row, active: !row.activo })"
          />
        </td>
        <td class="text-center">
          <button
            pButton
            type="button"
            class="group p-button-text !text-xs !font-semibold !py-1.5 !px-3 !rounded-full !border transition-all duration-300 ease-out active:translate-y-0"
            [ngClass]="row.activo
              ? '!border-[#8B1A2E]/20 !bg-[#fff3f6] !text-[#8B1A2E] hover:!bg-[#8B1A2E] hover:!text-white hover:shadow-md hover:shadow-[#8B1A2E]/25 hover:-translate-y-[1px]'
              : '!border-slate-200 !bg-slate-100 !text-slate-400 hover:!bg-slate-200 hover:!text-slate-500 hover:!shadow-none'"
            (click)="edit.emit(row)"
          ><span class="inline-flex items-center gap-1.5"><i class="pi pi-pen-to-square text-[0.7rem] transition-transform duration-300" [ngClass]="row.activo ? 'group-hover:rotate-[-8deg]' : ''"></i>Editar</span></button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="py-12 text-center text-sm text-slate-400">No hay registros que mostrar.</td>
      </tr>
    </ng-template>
  </p-table>
</section>

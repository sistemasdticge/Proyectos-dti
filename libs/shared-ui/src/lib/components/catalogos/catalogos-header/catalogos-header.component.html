<section class="rounded-2xl border border-slate-200 bg-gradient-to-r from-white to-[#fff7f8] px-5 py-4 shadow-sm">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
    <div class="min-w-0 border-l-4 border-[#8B1A2E] pl-4">
      <p class="text-xs font-semibold uppercase tracking-normal text-[#8B1A2E]">Resumen Institucional</p>
      <h1 class="mt-1 text-2xl font-bold tracking-normal text-[#1f2f4a]">{{ title }}</h1>
      <p class="mt-1 max-w-2xl text-sm leading-6 text-slate-500">{{ subtitle }}</p>
    </div>

    <div class="flex w-full items-center justify-center lg:w-auto lg:self-center lg:justify-end">
      <button
        pButton
        type="button"
        icon="pi pi-plus"
        class="inline-flex !h-11 !w-full sm:!w-auto !items-center !justify-center !gap-2 !rounded-xl !border-0 !bg-gradient-to-r !from-[#8B1A2E] !to-[#a6243d] !px-4 !text-sm !font-semibold !shadow-[0_10px_24px_rgba(139,26,46,0.22)] transition-all duration-300 ease-out hover:!-translate-y-[1px] hover:!from-[#771728] hover:!to-[#921f35] hover:!shadow-[0_14px_30px_rgba(139,26,46,0.28)] active:!translate-y-0 active:!shadow-[0_8px_18px_rgba(139,26,46,0.22)]"
        (click)="create.emit()"
      >{{ createLabel }}</button>
    </div>
  </div>
</section>

<!--
  Tabla reusable para resumen de temas.
  PrimeNG: p-table, p-button y p-tag.
  Tailwind: distribucion, colores y espaciado.
-->
<section class="overflow-hidden rounded-xl border border-[#d7dee8] bg-white shadow-sm" @temasTableEnter>
  <header class="flex items-center justify-between border-b border-slate-200 bg-slate-50/70 px-4 py-3 md:px-5">
    <div class="flex items-center gap-3">
      <span class="h-8 w-1 rounded-full bg-[#8B1A2E]"></span>
      <h2 class="text-lg font-extrabold tracking-normal text-[#1f2f4a]">{{ title }}</h2>
    </div>

    <div class="flex items-center gap-2">
      <button
        pButton
        type="button"
        icon="pi pi-filter"
        [text]="true"
        severity="secondary"
        aria-label="Filtrar"
        (click)="onFilterClick()"
      ></button>
      <button
        pButton
        type="button"
        icon="pi pi-download"
        [text]="true"
        severity="secondary"
        aria-label="Exportar"
        (click)="onExportClick()"
      ></button>
    </div>
  </header>

  <p-table
    [value]="rows"
    [loading]="loading"
    styleClass="p-datatable-sm"
    [rowHover]="true"
  >
    <ng-template pTemplate="header">
      <tr class="text-xs font-semibold text-slate-500 uppercase">
        <th class="pl-4">Número de Control</th>
        <th>Descripción</th>
        <th>Prioridad</th>
        <th>Vencimiento</th>
        <th>Estado</th>
        <th class="w-24"></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr class="border-b border-slate-100" @temasRowEnter>
        <td class="pl-4">
          <span class="font-semibold text-[#8B1A2E] text-sm whitespace-pre-line">{{ formatNumControl(row.numeroControl) }}</span>
        </td>
        <td>
          <p class="font-medium text-slate-800 text-sm">{{ row.descripcion }}</p>
          <p class="text-xs text-slate-400 mt-0.5">{{ row.area }}</p>
        </td>
        <td>
          <p-tag
            [value]="row.prioridad"
            [severity]="prioritySeverity(row.prioridad)"
            styleClass="!rounded-full !text-xs !px-2"
          />
        </td>
        <td>
          <span class="text-sm text-slate-600">
            {{ formatFecha(row.vencimiento) }}
          </span>
        </td>
        <td>
          <p-tag
            [value]="row.estado"
            [severity]="statusSeverity(row.estado)"
            styleClass="!rounded-full !text-xs !px-2"
          />
        </td>
        <td>
          <button
            pButton
            type="button"
            class="!text-xs !py-1 !px-2 p-button-text"
            (click)="onDetailClick(row)"
          >Ver</button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center py-12 text-slate-400 text-sm">
          No hay temas para mostrar.
        </td>
      </tr>
    </ng-template>
  </p-table>

  <footer class="border-t border-slate-200 bg-slate-50/60 px-4 py-2 text-xs text-slate-500 md:px-5">
    Mostrando {{ rows.length }} tema(s) activos
  </footer>
</section>

<div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-5 py-3">Nombre</th>
          <th class="px-5 py-3">Área</th>
          <th class="px-5 py-3">Tipo usuario</th>
          <th class="px-5 py-3">Estado</th>
          <th class="px-5 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @if (rows().length === 0) {
          <tr>
            <td class="px-5 py-6 text-center text-slate-500" colspan="5">
              No hay usuarios para mostrar.
            </td>
          </tr>
        } @else {
          @for (row of rows(); track trackByCorreo($index, row)) {
            <tr class="border-t border-slate-100">
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <span
                    class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-blue-100 text-xs font-semibold text-blue-700"
                  >
                    {{ row.iniciales }}
                  </span>
                  <div>
                    <p class="font-medium text-slate-800">{{ row.nombre }}</p>
                    <p class="text-xs text-slate-500">{{ row.correo }}</p>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 text-slate-600">{{ row.area }}</td>
              <td class="px-5 py-4">
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">
                  {{ row.tipoUsuario }}
                </span>
              </td>
              <td class="px-5 py-4">
                <span
                  class="rounded-full px-2.5 py-1 text-xs font-medium"
                  [class.bg-emerald-100]="row.estado === 'Activo'"
                  [class.text-emerald-700]="row.estado === 'Activo'"
                  [class.bg-slate-100]="row.estado === 'Inactivo'"
                  [class.text-slate-500]="row.estado === 'Inactivo'"
                >
                  {{ row.estado }}
                </span>
              </td>
              <td class="px-5 py-4 text-right">
                <div class="inline-flex items-center gap-2">
                  <button
                    type="button"
                    class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-slate-200 text-slate-500 transition hover:bg-slate-50 hover:text-blue-600"
                    title="Editar"
                    aria-label="Editar"
                    (click)="onEditar(row)"
                  >
                    ✎
                  </button>
                  <button
                    type="button"
                    class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-slate-200 text-slate-500 transition hover:bg-slate-50"
                    [title]="row.estado === 'Activo' ? 'Desactivar' : 'Activar'"
                    [attr.aria-label]="row.estado === 'Activo' ? 'Desactivar' : 'Activar'"
                    (click)="onToggleEstado(row)"
                  >
                    {{ row.estado === 'Activo' ? '⊘' : '✔' }}
                  </button>
                </div>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</div>

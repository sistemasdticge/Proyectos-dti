<section class="config-card rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
  <header class="mb-3 flex items-start justify-between gap-3 border-b border-slate-100 pb-2">
    <div>
      <h2 class="text-base font-semibold text-[#24344d]">{{ title }}</h2>
      @if (subtitle) {
        <p class="mt-0.5 text-sm text-slate-500">{{ subtitle }}</p>
      }
    </div>
    <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-[#fff1f3] text-[#8B1A2E]">
      <i [class]="icon"></i>
    </span>
  </header>

  <ng-content></ng-content>
</section>

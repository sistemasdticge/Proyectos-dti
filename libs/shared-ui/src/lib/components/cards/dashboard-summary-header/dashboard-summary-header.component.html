<!--
  Encabezado reusable del dashboard.
  Este bloque NO incluye boton de accion para respetar el requerimiento actual.
-->
<header class="flex items-center justify-between gap-3" @summaryHeaderEnter>
  <div class="min-w-0 border-l-4 border-[#8B1A2E] pl-4">
    <p class="text-xs font-semibold uppercase text-[#8B1A2E]">Resumen Institucional</p>
    <h1 class="mt-1 text-2xl font-bold tracking-normal text-[#1f2f4a]">{{ title }}</h1>
    <p class="mt-1 max-w-2xl text-sm leading-6 text-slate-500">{{ subtitle }}</p>
  </div>
</header>

<div class="login-card-shell">
  <form class="login-card" novalidate>
    <h1>Bienvenido</h1>
    <img class="login-card-brand-mobile" src="/images/login/SISAR2.png" alt="SISAR" />
    <p>Ingrese sus credenciales para continuar.</p>

    <div class="field-label">
      <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12a4.25 4.25 0 1 0 0-8.5a4.25 4.25 0 0 0 0 8.5Zm0 2.25c-4.56 0-8.25 2.29-8.25 5.12c0 .35.28.63.63.63h15.24c.35 0 .63-.28.63-.63c0-2.83-3.69-5.12-8.25-5.12Z" />
      </svg>
      <label for="username">Usuario</label>
    </div>
    <input id="username" type="text" placeholder="Correo institucional" />

    <div class="password-header">
      <div class="field-label field-label-password">
        <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 10V8a5 5 0 1 1 10 0v2h.75A2.25 2.25 0 0 1 20 12.25v7.5A2.25 2.25 0 0 1 17.75 22h-11.5A2.25 2.25 0 0 1 4 19.75v-7.5A2.25 2.25 0 0 1 6.25 10H7Zm2.5 0h5V8a2.5 2.5 0 1 0-5 0v2Z" />
        </svg>
        <label for="password">Contraseña</label>
      </div>
    </div>

    <div class="password-wrapper">
      <input id="password" [type]="showPassword() ? 'text' : 'password'" placeholder="Contraseña" />
      <button
        class="toggle-password"
        type="button"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword() ? 'Ocultar contrasena' : 'Mostrar contrasena'"
      >
        <svg
          class="eye-svg"
          [class.is-hidden]="showPassword()"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M2 12C3.8 8.5 7.2 6 12 6C16.8 6 20.2 8.5 22 12C20.2 15.5 16.8 18 12 18C7.2 18 3.8 15.5 2 12Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="12" cy="12" r="3" fill="currentColor" />
        </svg>

        <svg
          class="eye-svg"
          [class.is-hidden]="!showPassword()"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M2 12C3.8 8.5 7.2 6 12 6C16.8 6 20.2 8.5 22 12C20.2 15.5 16.8 18 12 18C7.2 18 3.8 15.5 2 12Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M4 4L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <a class="forgot-password-link" href="#">¿Olvidaste la contraseña?</a>

    <button class="login-button" type="button" (click)="requestLogin()">
      <span class="button-content">
        <span>Iniciar sesion</span>
        <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M13.75 5.75a1 1 0 1 1 1.5-1.32l5 5.75a1 1 0 0 1 0 1.14l-5 5.75a1 1 0 0 1-1.5-1.32L17.18 12l-3.43-3.93Z" />
          <path d="M4 12a1 1 0 0 1 1-1h13.5a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1Z" />
        </svg>
      </span>
    </button>
  </form>

  <footer class="login-footer">
    <a href="#">Aviso de Privacidad</a>
    <a href="#">Soporte Tecnico</a>
    <a href="#">Ayuda</a>
  </footer>
</div>

<main class="login-shell">
	<div class="corner-logos corner-logos-desktop" aria-hidden="true">
		<img class="corner-logo corner-logo-left" src="/images/login/gob-ver1.png" alt="" />
		<img class="corner-logo corner-logo-right" src="/images/login/por-amor-ver.png" alt="" />
	</div>

	<div class="corner-logos corner-logos-mobile" aria-hidden="true">
		<img class="corner-logo corner-logo-left" src="/images/login/gob-ver.png" alt="" />
		<img class="corner-logo corner-logo-right" src="/images/login/por-amor-ver.png" alt="" />
	</div>

	<section class="login-brand-panel">
		<div class="brand-card">
			<img class="brand-logo" src="/images/login/logo-sisar.png" alt="Logo SISAR" />
			<p class="brand-subtitle">Sistema de Seguimiento de Asuntos y Resoluciones</p>
		</div>
	</section>

	<section class="login-form-panel">
		<lib-login-card (loginRequested)="navigateToDashboard()"></lib-login-card>
	</section>
</main>

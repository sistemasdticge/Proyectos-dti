<div class="flex h-screen overflow-hidden bg-slate-100">
  <!-- Sidebar reutilizable para todas las pantallas privadas -->
  <lib-sidebar
    class="sticky top-0 shrink-0 self-start"
    [title]="sidebarTitle"
    [logoText]="sidebarLogoText"
    [logoSrc]="sidebarLogoSrc"
    [logoAlt]="sidebarLogoAlt"
    [items]="sidebarItems()"
    [showSystemStatus]="showSystemStatus"
    [systemStatusTitle]="systemStatusTitle"
    [systemStatusMessage]="systemStatusMessage"
    [systemStatusPercentage]="systemStatusPercentage"
    [systemStatusIcon]="systemStatusIcon"
    [animationDurationMs]="300"
    [(collapsed)]="isSidebarCollapsed"
    (itemSelected)="onSidebarItemSelected($event)"
    (logoutRequested)="onSidebarLogout()"
  ></lib-sidebar>

  <!--
    Contenedor principal de paginas privadas.
    pt-0 deja el navbar pegado arriba (sin separacion superior).
  -->
  <main class="layout-main-shell flex h-screen min-h-0 flex-1 flex-col overflow-hidden pt-0">
    <!--
      Consumo del navbar reusable.
      - [config]: define placeholder, notificaciones y usuario.
      - (searchChange): evento de busqueda para filtrar/listar datos.
      - (notificationClick): evento para abrir panel de notificaciones.
      - (userMenuClick): evento para menu de perfil/sesion.
    -->
    <lib-top-navbar
      [config]="topNavbarConfig()"
      (searchChange)="onTopNavbarSearch($event)"
      (notificationClick)="onTopNavbarNotifications()"
      (userMenuClick)="onTopNavbarUserMenu()"
    ></lib-top-navbar>

    <!-- Espacio de contenido de cada pagina hija (dashboard, usuarios, etc.) -->
    <section class="layout-content-shell mx-4 mb-4 min-h-0 flex-1 overflow-y-auto rounded-2xl border border-slate-200 bg-white p-4 md:mx-6 md:mb-6 md:p-6">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

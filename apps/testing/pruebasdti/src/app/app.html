<main class="min-h-screen bg-slate-100 p-6 md:p-8">
  <div class="mx-auto max-w-6xl overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
    <header class="border-b border-slate-200 px-6 py-4">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-3xl font-bold text-slate-800">Administración de Usuarios</h1>
          <p class="mt-1 text-slate-500">
            Gestione accesos, roles y estado de usuarios en la plataforma.
          </p>
        </div>
        <button
          type="button"
          class="add-user-button"
        >
          + Agregar Nuevo Usuario
        </button>
      </div>
    </header>

    <section class="space-y-5 p-6">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div class="flex flex-wrap items-center gap-2">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-400">Filtros:</span>
          <select class="rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm text-slate-600">
            <option>Área: Todas</option>
            <option>IT &amp; Operativa</option>
            <option>Recursos Humanos</option>
            <option>Finanzas</option>
          </select>
          <select class="rounded-md border border-slate-200 bg-white px-3 py-1.5 text-sm text-slate-600">
            <option>Tipo: Todos</option>
            <option>Administrador</option>
            <option>Editor</option>
            <option>Visualizador</option>
          </select>
        </div>

        <span class="text-sm text-slate-400">Mostrando {{ usuarios.length }} usuarios</span>
      </div>

      <lib-tabla-usuarios
        [rows]="usuarios"
        (editar)="onEditar($event)"
        (toggleEstado)="onToggleEstado($event)"
      ></lib-tabla-usuarios>

      <div class="flex items-center justify-between text-xs text-slate-400">
        <span>Página 1 de 1</span>
        <div class="inline-flex items-center gap-2">
          <button type="button" class="rounded border border-slate-200 px-2 py-1">&lt;</button>
          <button type="button" class="rounded border border-slate-200 px-2 py-1">&gt;</button>
        </div>
      </div>
    </section>
  </div>

  <router-outlet></router-outlet>
</main>
